<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#4A2C2A" />
  
  <!-- Coffee Cup (Left/Center) -->
  <g transform="translate(110, 180)">
    <!-- Steam -->
    <path d="M70,-50 C75,-30 65,-10 70,10" fill="none" stroke="#EDE0D4" stroke-width="8" stroke-linecap="round"/>
    <path d="M100,-60 C105,-40 95,-20 100,0" fill="none" stroke="#EDE0D4" stroke-width="8" stroke-linecap="round"/>
    <path d="M130,-50 C135,-30 125,-10 130,10" fill="none" stroke="#EDE0D4" stroke-width="8" stroke-linecap="round"/>
    <!-- Cup Body -->
    <path d="M30,20 L170,20 C170,100 150,140 100,140 C50,140 30,100 30,20 Z" fill="#EDE0D4" />
    <!-- Handle -->
    <path d="M170,40 C195,40 205,70 170,90" fill="none" stroke="#EDE0D4" stroke-width="14" stroke-linecap="round" />
    <!-- Saucer -->
    <path d="M10,150 L190,150 C200,150 200,162 190,162 L10,162 C0,162 0,150 10,150 Z" fill="#DDB892" />
  </g>

  <!-- Shoe Prints (Right/Center) -->
  <g transform="translate(320, 200) rotate(15)">
    <!-- Right Shoe Sole -->
    <!-- Heel -->
    <ellipse cx="0" cy="80" rx="25" ry="20" fill="#DDB892" />
    <!-- Arch bridge -->
    <path d="M-15,40 L15,40 L18,70 L-18,70 Z" fill="#DDB892" />
    <!-- Front sole -->
    <ellipse cx="0" cy="10" rx="35" ry="30" fill="#DDB892" />
    <!-- Small treads -->
    <circle cx="-15" cy="-28" r="5" fill="#4A2C2A" />
    <circle cx="0" cy="-32" r="5" fill="#4A2C2A" />
    <circle cx="15" cy="-28" r="5" fill="#4A2C2A" />
  </g>
  <g transform="translate(260, 100) rotate(15)">
    <!-- Left Shoe Sole -->
    <!-- Heel -->
    <ellipse cx="0" cy="80" rx="25" ry="20" fill="#EDE0D4" />
    <!-- Arch bridge -->
    <path d="M-15,40 L15,40 L18,70 L-18,70 Z" fill="#EDE0D4" />
    <!-- Front sole -->
    <ellipse cx="0" cy="10" rx="35" ry="30" fill="#EDE0D4" />
    <!-- Small treads -->
    <circle cx="-15" cy="-28" r="5" fill="#4A2C2A" />
    <circle cx="0" cy="-32" r="5" fill="#4A2C2A" />
    <circle cx="15" cy="-28" r="5" fill="#4A2C2A" />
  </g>
</svg>
